<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-green-900 content-center flex items-center justify-center min-h-screen">
    <div class="card w-full max-w-lg  mx-auto p-6 bg-white shadow-md rounded-xl border border-gray-200">
        <img src="/src/assets/logomarca.jpg" alt="Logo" class="w-35 mx-auto mb-6">
        <form id="loginForm">
            <div class="space-y-12">
                <div class="mt-5 grid grid-cols-1 gap-x-5 gap-y-8 sm:grid-cols-6">
                    <div class="col-span-full">
                        <div
                            class="flex items-center rounded-md bg-white pl-3 outline-1 -outline-offset-1 outline-gray-300 focus-within:outline-2 focus-within:-outline-offset-2 focus-within:outline-green-900">
                            <input id="email" type="email" name="email" placeholder="E-mail"
                                class="block min-w-0 grow py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm/6" />
                        </div>
                    </div>
                    <div class="col-span-full">
                        <div
                            class="flex items-center rounded-md bg-white pl-3 outline-1 -outline-offset-1 outline-gray-300 focus-within:outline-2 focus-within:-outline-offset-2 focus-within:outline-green-900">
                            <input id="password" type="password" name="password" placeholder="Senha"
                                class="block min-w-0 grow py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm/6" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-10 flex items-center justify-end">
                <a class="text-sm font-semibold text-blue-900 me-5 underline" href="http://">Cadastre-se</a>
                <button type="submit" id="btnLogin"
                    class="rounded-md bg-green-600 px-3 py-2 font-semibold text-white shadow-xs hover:bg-green-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-green-600 w-50">Entrar</button>
            </div>
        </form>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
