<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Formulário Categoria</title>
</head>
<body>
    <div id="menu-container"></div>
    <form onsubmit="enviarFormulario(event)">
        <h1>Cadastro de Categoria</h1>
        <p><label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required></p>

        <p><label for="descricao">Descrição:</label>
        <input type="text" id="descricao" name="descricao" required></p>

        <button type="submit">Enviar</button>
    </form>
    <p id="cadastrada"></p>

    <script>
        function enviarFormulario(event) {
            event.preventDefault();  // Evita o reload da página

            const nome = document.getElementById('nome').value;
            const descricao = document.getElementById('descricao').value;

            const dados = {
                nome: nome,
                descricao: descricao
            };

            fetch('http://localhost:8080/api/categorias', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dados)
            })
            .then(response => {
                if (!response.ok) throw new Error('Erro na requisição');
                return response.json();
            })
            .then(data => {
                console.log('Sucesso:', data);
                document.getElementById('cadastrada').textContent = 'Categoria cadastrada com sucesso!';
            })
            .catch(error => {
                console.error('Erro:', error);
                document.getElementById('cadastrada').textContent = 'Erro ao cadastrar categoria.';
            }).finally(() => {
                document.getElementById('nome').value = '';
                document.getElementById('descricao').value = '';
            });
        }
    </script>
    <script src="/admin/menu.js"></script>
</body>
</html>
